name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why is this useful? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds or alternative approaches?
    validations:
      required: false

  - type: input
    id: hardware
    attributes:
      label: Hardware (if relevant)
      description: Your base, wheel, dashboard, pedals, or handbrake models
      placeholder: "e.g. R5 base, CS V2 wheel"
    validations:
      required: false
