name: Bug Report
description: Report a problem with the plugin
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: simhub-version
    attributes:
      label: SimHub Version
      placeholder: "e.g. 9.11.2"
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      placeholder: "e.g. v0.5.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - Linux (Proton/Wine)
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Hardware
      description: Base, wheel, dashboard, pedals, and handbrake models
      placeholder: "e.g. R5 base, GS V2 Pro wheel, no dashboard"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open SimHub
        2. Go to ...
        3. Click on ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant SimHub log output (check SimHub logs for `[Moza]` entries)
      render: text
    validations:
      required: false

  - type: checkboxes
    id: pithouse
    attributes:
      label: Pithouse
      options:
        - label: I have confirmed Pithouse is fully closed before reproducing this issue
          required: true
